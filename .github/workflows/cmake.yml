name: CMake

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
      with:
        submodules: recursive

    - name: Install lcov
      run: sudo apt-get install -y lcov

    - name: Fix GTest Dummy Bug
      run: sed -i 's/int dummy;/int dummy = 0;/' third-party/gtest/googletest/src/gtest-death-test.cc

    - name: Configure CMake
      run: cmake -H. -B_build -DBUILD_TESTS=ON -DCMAKE_CXX_FLAGS="--coverage -O0"

    - name: Build
      run: cmake --build _build

    - name: Run tests
      run: ./_build/check

    - name: Generate Coverage
      run: |
        lcov --ignore-errors mismatch \
             --capture \
             --directory . \
             --output-file coverage.info

        lcov --ignore-errors mismatch \
             --remove coverage.info \
             '/usr/*' \
             '*/third-party/*' \
             '*/tests/*' \
             --output-file coverage.info

        lcov --list coverage.info

    - name: Coveralls Report
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
